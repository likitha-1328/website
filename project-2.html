<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - E Library</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
 
            background-image: url("login.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        
        .login-box{
            width:350px;
            background-color: rgba(255,255,255,0.9);
            padding:40px;
            border-radius:15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);

            margin:150px auto; /* centers horizontally */
            text-align:center;
        }

        h2{
            color:#0f2167;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
            font-size:14px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background-color:#1e3a8a;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        .extra{
            margin-top:15px;
            font-size:14px;
        }

        .extra a{
            text-decoration:none;
            color:#1e3a8a;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <form action="project-4.html">
        <h2>Login to E-Library</h2>

        <input type="text" placeholder="Username" >
        <input type="password" placeholder="Password" >

        <button type="submit">Login</button>

        <div class="extra">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
        </form>
    </div>

</body>
</html>
